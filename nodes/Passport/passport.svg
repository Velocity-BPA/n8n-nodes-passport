<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#1A1A2E"/>
  
  <!-- Passport device outline -->
  <rect x="16" y="8" width="32" height="48" rx="4" fill="#0F0F1A" stroke="#00D4AA" stroke-width="2"/>
  
  <!-- Screen area -->
  <rect x="20" y="12" width="24" height="28" rx="2" fill="#1A1A2E" stroke="#00D4AA" stroke-width="1"/>
  
  <!-- Bitcoin symbol on screen -->
  <g transform="translate(32, 26)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#F7931A" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F7931A" text-anchor="middle">₿</text>
  </g>
  
  <!-- Camera lens -->
  <circle cx="32" cy="44" r="4" fill="#2D2D44" stroke="#00D4AA" stroke-width="1"/>
  <circle cx="32" cy="44" r="2" fill="#00D4AA"/>
  
  <!-- Side button indicators -->
  <rect x="12" y="20" width="2" height="6" rx="1" fill="#00D4AA"/>
  <rect x="12" y="30" width="2" height="6" rx="1" fill="#00D4AA"/>
  
  <!-- Foundation wordmark hint -->
  <rect x="22" y="52" width="20" height="2" rx="1" fill="#00D4AA" opacity="0.5"/>
</svg>
